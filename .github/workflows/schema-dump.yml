name: schema-dump
# Replaces the local "supabase db dump" step (no Node/CLI needed on your machine).
# Manual-only: Actions tab > schema-dump > Run workflow. Produces
# schema-baseline.sql as a downloadable artifact: tables, triggers, functions
# and RLS policies, no data. Re-run quarterly or after any hand edit made
# directly in the dashboard, per the schema-truth runbook.

on:
  workflow_dispatch: {}

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - name: Install postgres client 17
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl ca-certificates gnupg lsb-release
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/pgdg.gpg
          echo "deb [signed-by=/usr/share/keyrings/pgdg.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-17
      - name: Dump schema only
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          /usr/lib/postgresql/17/bin/pg_dump "$DB_URL" --schema-only --schema=public --no-owner --no-privileges -f schema-baseline.sql
          echo "---- trigger presence check ----"
          grep -c "enforce_activity_locks" schema-baseline.sql || true
          grep -c "enforce_completion_window" schema-baseline.sql || true
          grep -c "trg_completion_window" schema-baseline.sql || true
          ls -la schema-baseline.sql
      - name: Publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: schema-baseline
          path: schema-baseline.sql
          retention-days: 14

name: db-backup
# Zero-cost substitute for PITR (declined at USD 100/month).
# Nightly logical dump of the full database, kept 14 days as a workflow
# artifact, plus on-demand runs before risky operations.
#
# Setup (one time):
#   GitHub repo > Settings > Secrets and variables > Actions > New secret
#   Name:  SUPABASE_DB_URL
#   Value: the Session pooler URI from the dashboard Connect button
#          (postgresql://postgres.nbukhiaczzebfsyxofga:[PASSWORD]@aws-0-<region>.pooler.supabase.com:5432/postgres)
#
# v2: installs the Postgres 17 client from the official PostgreSQL apt repo.
# ubuntu-latest (24.04) does not ship postgresql-client-15, and a client older
# than the server makes pg_dump abort, so 17 covers Supabase on 15, 16 or 17.

on:
  schedule:
    - cron: "15 0 * * *"   # 00:15 UTC nightly, 03:15 Helsinki
  workflow_dispatch: {}     # Actions tab > db-backup > Run workflow, before anything risky

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - name: Install postgres client 17
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl ca-certificates gnupg lsb-release
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/pgdg.gpg
          echo "deb [signed-by=/usr/share/keyrings/pgdg.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-17
      - name: Dump database
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          STAMP=$(date -u +%Y%m%d-%H%M)
          /usr/lib/postgresql/17/bin/pg_dump "$DB_URL" --no-owner --no-privileges -F c -f "dlp-$STAMP.dump"
          ls -la dlp-*.dump
      - name: Keep 14 days
        uses: actions/upload-artifact@v4
        with:
          name: dlp-db-${{ github.run_id }}
          path: dlp-*.dump
          retention-days: 14
